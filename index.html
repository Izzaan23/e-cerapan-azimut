<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cerapan Azimut (Lampiran K1)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; padding-bottom: 40px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { font-weight: bold; background-color: #0d6efd; color: white; }
        .input-error { background-color: #ffe6e6 !important; border-color: #dc3545 !important; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 2px solid #0d6efd; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Sistem E-Cerapan Azimut</h2>

    <div class="card">
        <div class="card-header">Seksyen 1: Maklumat Am (Header)</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6 col-12">
                    <label>Nama Penilik</label>
                    <input type="text" class="form-control" placeholder="Masukkan nama...">
                </div>
                <div class="col-md-6 col-12">
                    <label>Stesen</label>
                    <input type="text" class="form-control" placeholder="Contoh: STN 1">
                </div>
                <div class="col-md-6 col-12">
                    <label>Tarikh & Waktu (Auto)</label>
                    <input type="text" id="waktuSemasa" class="form-control" readonly>
                </div>
                <div class="col-md-6 col-12">
                    <label>Koordinat Stesen (Lat / Long)</label>
                    <div class="input-group">
                        <input type="text" id="koordinat" class="form-control" placeholder="Klik butang untuk dapatkan GPS..." readonly>
                        <button class="btn btn-secondary" type="button" onclick="getGPS()">Ambil GPS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Seksyen 2: Data Cerapan (Format: D.MMSS)</div>
        <div class="card-body">
            <h5 class="section-title">Cerapan Mengufuk (Set 1)</h5>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label>Penyilang Kiri</label>
                    <input type="number" id="hKiri" class="form-control cerapan-input" step="any" placeholder="Contoh: 90.0000">
                </div>
                <div class="col-6">
                    <label>Penyilang Kanan</label>
                    <input type="number" id="hKanan" class="form-control cerapan-input" step="any" placeholder="Contoh: 270.0015">
                </div>
                <div class="col-12 text-end">
                    <small id="statusSelisih" class="form-text text-muted">Selisih: 0"</small>
                </div>
            </div>

            <h5 class="section-title">Cerapan Pugak (Set 1)</h5>
            <div class="row g-3">
                <div class="col-6">
                    <label>Penyilang Kiri</label>
                    <input type="number" class="form-control" step="any">
                </div>
                <div class="col-6">
                    <label>Penyilang Kanan</label>
                    <input type="number" class="form-control" step="any">
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Seksyen 3: Pengiraan Automatik</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6 col-12">
                    <label>Purata Altitud (H)</label>
                    <input type="text" id="purataH" class="form-control" readonly>
                </div>
                <div class="col-md-6 col-12">
                    <label>Pembetulan Biasan & Bedalihat</label>
                    <input type="text" id="pembetulan" class="form-control" readonly placeholder="Auto-kira...">
                </div>
            </div>
            <div class="mt-3 text-center">
                <button class="btn btn-success w-100 py-2" onclick="kiraSemua()">Laksanakan Pengiraan</button>
            </div>
        </div>
    </div>

    <div class="card border-success">
        <div class="card-header bg-success text-white">Seksyen 4: Keputusan Akhir</div>
        <div class="card-body text-center">
            <h4>Bearing Grid TR: <span id="finalBearing" class="text-primary">00° 00' 00"</span></h4>
            <hr>
            <button class="btn btn-outline-danger w-100 mt-2" onclick="window.print()">Simpan / Cetak PDF (Lampiran K1)</button>
        </div>
    </div>

</div>

<script>
    // 1. Auto Tarikh & Waktu
    document.getElementById('waktuSemasa').value = new Date().toLocaleString('ms-MY');

    // 2. Fungsi Geolocation (Ambil Koordinat dari Phone/Browser)
    function getGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                let lat = position.coords.latitude.toFixed(5);
                let lon = position.coords.longitude.toFixed(5);
                document.getElementById('koordinat').value = lat + ", " + lon;
            }, function() {
                alert("Sila benarkan akses GPS di browser anda.");
            });
        } else {
            alert("Browser anda tidak menyokong Geolocation.");
        }
    }

    // 3. Fungsi Semakan Selisih (Validation DMS JUPEM style)
    // Dengar perubahan pada input Kiri & Kanan
    const inputHKiri = document.getElementById('hKiri');
    const inputHKanan = document.getElementById('hKanan');
    const statusSelisih = document.getElementById('statusSelisih');

    function semakSelisih() {
        let kiri = parseFloat(inputHKiri.value);
        let kanan = parseFloat(inputHKanan.value);

        if(!isNaN(kiri) && !isNaN(kanan)) {
            // Logik matematik mudah untuk cari perbezaan saat (Anggapan input format darjah.minitsaat)
            // Nota: Ini pengiraan perpuluhan kasar untuk demo. Untuk ketepatan Ukur Tanah, 
            // format darjah.minit.saat (D.MMSS) perlu ditukar ke Saat penuh dahulu.
            
            let beza = Math.abs((kanan - 180) - kiri); 
            // Anggap beza adalah dalam perpuluhan darjah, tukar ke saat
            let selisihSaat = (beza * 10000).toFixed(0); 

            statusSelisih.innerText = "Selisih: " + selisihSaat + "''";

            // Kalau selisih lebih 30 saat, tukar warna kotak jadi merah (Amaran)
            if (selisihSaat > 30) {
                inputHKiri.classList.add('input-error');
                inputHKanan.classList.add('input-error');
                statusSelisih.classList.add('text-danger');
                statusSelisih.innerText += " (AMARAN: Melebihi 30\")";
            } else {
                inputHKiri.classList.remove('input-error');
                inputHKanan.classList.remove('input-error');
                statusSelisih.classList.remove('text-danger');
                statusSelisih.classList.add('text-success');
            }
        }
    }

    inputHKiri.addEventListener('input', semakSelisih);
    inputHKanan.addEventListener('input', semakSelisih);

    // 4. Fungsi Butang Kira (Otak Sistem)
    function kiraSemua() {
        // Di sini awak boleh masukkan formula kosain azimut, tirusan, bedalihat.
        // Sebagai contoh (Placeholder):
        document.getElementById('purataH').value = "45° 15' 30\" (Contoh)";
        document.getElementById('pembetulan').value = "- 0° 0' 15\" (Contoh)";
        document.getElementById('finalBearing').innerText = "120° 45' 10\"";
        alert("Pengiraan berjaya dilaksanakan!");
    }
</script>

</body>
</html>
