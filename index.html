<script>
    // 1. Auto Tarikh & Waktu
    document.getElementById('waktuSemasa').value = new Date().toLocaleString('ms-MY');

    // 2. Helper: Tukar D.MMSS ke Decimal Degree (PENTING untuk pengiraan)
    function dmsToDd(dms) {
        if (isNaN(dms)) return 0;
        let d = Math.floor(dms);
        let m = Math.floor((dms - d) * 100);
        let s = Math.round((dms - d - (m / 100)) * 10000);
        return d + (m / 60) + (s / 3600);
    }

    // 3. Helper: Tukar Decimal Degree ke format D° M' S" (Paparan)
    function ddToDmsString(dd) {
        let d = Math.floor(dd);
        let m = Math.floor((dd - d) * 60);
        let s = Math.round((dd - d - (m / 60)) * 3600);
        if (s >= 60) { s = 0; m++; }
        if (m >= 60) { m = 0; d++; }
        return d + "° " + m + "' " + s + "\"";
    }

    // 4. THE BRAIN: Fungsi Kira Ikut Gambar Formula
    function kiraSemua() {
        // Ambil Data dari Input (Pastikan ID input di HTML kau betul)
        // Kita anggap Hz1, Hz2 (P.Ki) dan Hz3, Hz4 (P.Ka)
        let Hz1 = dmsToDd(parseFloat(document.getElementById('hKiri').value)); 
        let Hz3 = dmsToDd(parseFloat(document.getElementById('hKanan').value));
        
        // Data Pugak (V1-V4)
        let V1 = dmsToDd(parseFloat(document.getElementById('vKiri').value));
        let V3 = dmsToDd(parseFloat(document.getElementById('vKanan').value));

        // A. PURATA WAKTU - 8.00
        // (Nota: Untuk demo, kita fokus pada formula B-F dahulu)

        // B. PURATA UFUK
        let purataUfuk;
        if (Hz1 < 180) {
            // Formula: Hz1 + Hz2 + (Hz3-180) + (Hz4-180) / 4
            // (Dipendekkan untuk 2 cerapan: (Hz1 + (Hz3-180)) / 2 )
            purataUfuk = (Hz1 + (Hz3 - 180)) / 2;
        } else {
            // Formula: Hz1 + Hz2 + (Hz3+180) + (Hz4+180) / 4
            purataUfuk = (Hz1 + (Hz3 + 180)) / 2;
        }

        // D. PURATA ALTITUD (H)
        let H_DD;
        let jamSekarang = new Date().getHours();
        
        if (jamSekarang < 12) {
            // Observation in AM: (90-V1) + (V3-270) / 2
            H_DD = ((90 - V1) + (V3 - 270)) / 2;
        } else {
            // Observation in PM: (V1) + (V3-180) / 2
            H_DD = (V1 + (V3 - 180)) / 2;
        }

        // E. BIASAN & BEDALIHAT (PARALLAX)
        // Formula: ((41.4105 + (8.8 cos H)) / tan H) / 3600 (Bahagi 3600 untuk jadi Degree)
        let H_rad = H_DD * Math.PI / 180;
        let biasanSaat = (41.4105 + (8.8 * Math.cos(H_rad))) / Math.tan(H_rad);
        let E_DD = biasanSaat / 3600;

        // F. ALTITUD DILARAS (alpha)
        let alpha = H_DD - E_DD;

        // --- PAPARKAN KEPUTUSAN ---
        document.getElementById('purataH').value = ddToDmsString(H_DD);
        document.getElementById('pembetulan').value = biasanSaat.toFixed(2) + " saat";
        
        // Pengiraan Azimut (Guna formula Kosain dari mesej sebelum ni)
        let phi = dmsToDd(parseFloat(document.getElementById('latitud').value || 0));
        let delta = dmsToDd(parseFloat(document.getElementById('sudutistiwa').value || 0));
        
        let cosA = (Math.sin(delta * Math.PI/180) - (Math.sin(phi * Math.PI/180) * Math.sin(alpha * Math.PI/180))) / 
                   (Math.cos(phi * Math.PI/180) * Math.cos(alpha * Math.PI/180));
        
        let Azimut = Math.acos(cosA) * 180 / Math.PI;

        document.getElementById('finalBearing').innerText = ddToDmsString(Azimut);
        
        alert("Pengiraan Automatik Berjaya (Ikut Formula Lampiran K1)!");
    }

    // Fungsi GPS (Kekal sama)
    function getGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                document.getElementById('koordinat').value = position.coords.latitude.toFixed(5) + ", " + position.coords.longitude.toFixed(5);
            });
        }
    }
</script>
